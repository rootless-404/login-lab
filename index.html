<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Admin Login</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<!-- Security -->
<meta http-equiv="Content-Security-Policy"
content="default-src 'self'; style-src 'self'; script-src 'self'; frame-ancestors 'none'">
<meta http-equiv="X-Frame-Options" content="DENY">

<style>
*{box-sizing:border-box}
body{
  margin:0;height:100vh;display:flex;align-items:center;justify-content:center;
  background:linear-gradient(135deg,#0f2027,#203a43,#2c5364);
  font-family:Arial,sans-serif;color:#fff
}
.card{
  width:340px;background:#111;border-radius:14px;padding:30px;
  box-shadow:0 20px 40px rgba(0,0,0,.6)
}
h2{text-align:center;margin-bottom:20px}
input,button{
  width:100%;padding:12px;margin:8px 0;border-radius:8px;border:none;font-size:15px
}
input{background:#222;color:#fff}
button{
  background:#00c6ff;color:#000;font-weight:bold;cursor:pointer
}
button:hover{background:#00a3d9}
.msg{margin-top:12px;text-align:center;color:#ff6b6b;font-size:14px}
.footer{text-align:center;margin-top:14px;font-size:12px;color:#aaa}
</style>
</head>

<body>
<div class="card">
  <h2>Admin Login</h2>

  <form id="loginForm" autocomplete="off">
    <input id="user" placeholder="Username" required>
    <input id="pass" type="password" placeholder="Password" required>
    <button type="submit">Login</button>
  </form>

  <div class="msg" id="msg"></div>
  <div class="footer">Secure Panel • Demo</div>
</div>

<script>
const MAX = 3;
let tries = 0;

function sanitize(s){return s.replace(/[<>'"]/g,'')}

document.getElementById('loginForm').addEventListener('submit',e=>{
  e.preventDefault();
  if(tries>=MAX){
    msg.textContent="Too many attempts. Try later.";
    return;
  }
  tries++;

  const u = sanitize(user.value);
  const p = pass.value;

  // Demo credential (آموزشی)
  if(u==="admin" && p==="Admin@1234"){
    localStorage.setItem("auth","true");
    window.location="admin.html";
  }else{
    msg.textContent="Invalid credentials.";
  }
});
</script>
</body>
</html>
