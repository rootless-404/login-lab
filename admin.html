<!DOCTYPE html>
<html lang="fa">
<head>
<meta charset="UTF-8">
<title>Admin Dashboard</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
@keyframes slide {
  from { opacity: 0; transform: translateY(20px); }
  to { opacity: 1; transform: translateY(0); }
}

body {
  margin: 0;
  min-height: 100vh;
  font-family: Tahoma, sans-serif;
  background: linear-gradient(135deg,#141e30,#243b55);
  color: #fff;
}

.header {
  padding: 20px;
  text-align: center;
  font-size: 22px;
  background: rgba(255,255,255,0.08);
  backdrop-filter: blur(10px);
}

.panel {
  padding: 30px;
  display: grid;
  gap: 20px;
  animation: slide .8s ease;
}

.card {
  padding: 25px;
  border-radius: 16px;
  background: rgba(255,255,255,0.12);
  backdrop-filter: blur(14px);
  box-shadow: 0 20px 40px rgba(0,0,0,.5);
}

.logout {
  padding: 14px;
  border-radius: 14px;
  border: none;
  font-weight: bold;
  background: linear-gradient(135deg,#ff416c,#ff4b2b);
  cursor: pointer;
  color: #000;
}
</style>
</head>

<body>

<div class="header">🛡 Secure Admin Panel</div>

<div class="panel">
  <div class="card">
    <h3>Session Status</h3>
    <p>✔ Authenticated & Encrypted</p>
  </div>

  <div class="card">
    <h3>Security Monitor</h3>
    <p>No suspicious activity detected</p>
  </div>

  <button class="logout" onclick="logout()">Logout</button>
</div>

<script>
(function protect(){
  const t = localStorage.getItem("authToken");
  const e = localStorage.getItem("expire");

  if(!t || !e || Date.now() > e) kick();

  try {
    if(JSON.parse(atob(t)).user !== "admin") kick();
  } catch {
    kick();
  }
})();

function kick(){
  localStorage.clear();
  location.href = "index.html";
}

function logout(){
  kick();
}

let last = Date.now();
["click","keydown","mousemove","touchstart"].forEach(ev =>
  addEventListener(ev,()=> last = Date.now())
);

setInterval(()=>{
  if(Date.now() - last > 5*60*1000) kick();
},10000);
</script>

</body>
</html>
